<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CMU 今天吃什麼？｜中國醫學生美食人格測驗</title>
  <meta name="description" content="回答 6 題心理測驗，推薦 3 間中國醫附近適合今天狀態的店家，並提供 Google Maps 導航。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="hero__badge">中國醫學生專用</div>
      <h1>CMU 今天吃什麼？</h1>
      <p>用 1 分鐘測出你的今日吃飯人格，直接推薦 3 間中國醫附近店家。</p>
    </header>

    <main>
      <section id="start-screen" class="panel screen is-active" aria-labelledby="start-title">
        <h2 id="start-title">先不用再問「等一下吃什麼」</h2>
        <p>這個網站會依照你現在的時間、預算、口味、用餐模式與排隊容忍度，算出最適合的 3 間店。</p>
        <div class="feature-grid">
          <div><strong>6 題測驗</strong><span>快速判斷今天狀態</span></div>
          <div><strong>3 間推薦</strong><span>避免選擇太多</span></div>
          <div><strong>直接導航</strong><span>Google Maps 一鍵開啟</span></div>
        </div>
        <button class="primary-button" id="start-btn">開始測驗</button>
      </section>

      <section id="setup-screen" class="panel screen" aria-labelledby="setup-title">
        <p class="eyebrow">Step 1 / 2</p>
        <h2 id="setup-title">你現在在哪裡？</h2>
        <div class="field-group">
          <span class="field-label">目前位置</span>
          <div id="campus-choice-list" class="choice-grid" aria-label="目前位置"></div>
        </div>
        <div class="field-group">
          <span class="field-label">用餐時段</span>
          <div id="meal-choice-list" class="choice-grid" aria-label="用餐時段"></div>
        </div>
        <div class="field-group">
          <label for="budget-input">最高預算</label>
          <div class="budget-row">
            <input id="budget-input" type="number" min="50" max="500" step="10" value="150" />
            <span>元</span>
          </div>
        </div>
        <button class="primary-button" id="go-quiz-btn">開始回答 6 題</button>
        <button class="ghost-button" data-back="start-screen">回首頁</button>
      </section>

      <section id="quiz-screen" class="panel screen" aria-labelledby="quiz-title">
        <div class="progress-row">
          <span id="progress-text">Q1 / 6</span>
          <div class="progress-track"><div id="progress-bar"></div></div>
        </div>
        <p class="eyebrow">Step 2 / 2</p>
        <h2 id="quiz-title"></h2>
        <div id="option-list" class="option-list"></div>
        <button class="ghost-button" id="quiz-back-btn">上一題</button>
      </section>

      <section id="result-screen" class="panel screen" aria-labelledby="result-title">
        <p class="eyebrow">測驗結果</p>
        <h2 id="result-title"></h2>
        <p id="result-copy" class="result-copy"></p>

        <div class="score-card">
          <h3>你的標籤分數</h3>
          <div id="score-list" class="score-list"></div>
        </div>

        <h3 class="recommend-title">推薦你這 3 間</h3>
        <div id="recommendations" class="recommendation-list"></div>

        <div class="result-actions">
          <button class="primary-button" id="restart-btn">重新測一次</button>
          <button class="ghost-button" id="change-setting-btn">換校區或預算</button>
        </div>
      </section>
    </main>

    <footer>
      <p>資料由試算表轉換而來。正式展示前，建議人工確認價格、營業時間與店家狀態。</p>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
